sonar.projectKey=shellmate

# Source and exclusions
sonar.sources=.
sonar.exclusions=**/*_test.go,migrations/**,**/*.sql,.golangci.yml,.github/**,.testcoverage.yml

# Test files (so SQ can distinguish test coverage from production code)
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go test coverage (generate with: go test -coverprofile=coverage.out ./...)
sonar.go.coverage.reportPaths=coverage.out
